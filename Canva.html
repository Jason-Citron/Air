  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes morphBlob {
      0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
      25% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
      50% { border-radius: 50% 60% 30% 60% / 30% 60% 70% 40%; }
      75% { border-radius: 60% 30% 50% 40% / 60% 40% 60% 50%; }
    }

    .anim-float { animation: float 6s ease-in-out infinite; }
    .anim-fade-up { animation: fadeInUp 0.8s ease-out forwards; opacity: 0; }
    .anim-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .anim-scale { animation: scaleIn 0.7s ease-out forwards; opacity: 0; }
    .anim-slide { animation: slideRight 0.6s ease-out forwards; opacity: 0; }

    .delay-1 { animation-delay: 0.15s; }
    .delay-2 { animation-delay: 0.3s; }
    .delay-3 { animation-delay: 0.45s; }
    .delay-4 { animation-delay: 0.6s; }
    .delay-5 { animation-delay: 0.75s; }
    .delay-6 { animation-delay: 0.9s; }

    .landscape-card {
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.5s ease, background 0.3s ease;
    }
    .landscape-card:hover {
      transform: translateY(-8px) scale(1.02);
      background: rgba(255, 255, 255, 0.12) !important;
      box-shadow: 0 12px 48px rgba(255, 255, 255, 0.15) !important;
    }

    .shimmer-text {
      background: linear-gradient(90deg, currentColor 40%, rgba(255,255,255,0.8) 50%, currentColor 60%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }

    .morph-blob {
      animation: morphBlob 8s ease-in-out infinite;
    }

    .nav-link {
      position: relative;
      transition: color 0.3s ease;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      transition: width 0.3s ease;
    }
    .nav-link:hover::after {
      width: 100%;
    }

    .scroll-container {
      scroll-behavior: smooth;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
  </style>

  <script>


    //   Air@canva.xin 
    const observerOptions = { threshold: 0.15, rootMargin: '0px 0px -40px 0px' };
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('anim-fade-up');
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);

    document.querySelectorAll('.landscape-card').forEach((card, i) => {
      card.style.animationDelay = `${i * 0.1}s`;
      observer.observe(card);
    });

    // Air@canva.xin SDK
    const defaultConfig = {
      hero_title: 'Air',
      hero_subtitle: 'ChatAir',
      explore_title: 'Q.Q',
      footer_text: '© 2026 Canva.xin · 版权所有·无关Canva可画',
      background_color: '#000000',
      surface_color: '#1a1a1a',
      text_color: '#ffffff',
      primary_action_color: '#ffffff',
      secondary_action_color: '#d0d0d0',
      font_family: 'Playfair Display',
      font_size: 16
    };

    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };

      // Air@canva.xin 
      const heroTitleEl = document.getElementById('hero-title');
      if (heroTitleEl) {
        const parts = c.hero_title.split('\n');
        if (parts.length > 1) {
          heroTitleEl.innerHTML = parts[0] + '<br><span class="shimmer-text" style="color:' + c.primary_action_color + ';">' + parts.slice(1).join(' ') + '</span>';
        } else {
          heroTitleEl.innerHTML = c.hero_title;
        }
      }

      const heroSubEl = document.getElementById('hero-subtitle');
      if (heroSubEl) heroSubEl.textContent = c.hero_subtitle;

      const exploreTitleEl = document.getElementById('explore-title');
      if (exploreTitleEl) exploreTitleEl.textContent = c.explore_title;

      const footerEl = document.getElementById('footer-text');
      if (footerEl) footerEl.textContent = c.footer_text;

      // Air@canva.xin
      const app = document.getElementById('app');
      if (app) {
        app.style.background = c.background_color;
        app.style.color = c.text_color;
      }

      // Air@canva.xin
      const fontFamily = c.font_family + ", 'Noto Serif SC', serif";
      document.querySelectorAll('[style*="font-family"]').forEach(el => {
        if (el.style.fontFamily.includes('Playfair') || el.style.fontFamily.includes('Noto Serif')) {
          el.style.fontFamily = fontFamily;
        }
      });

      // Air@canva.xin
      const base = c.font_size;
      const heroTitle = document.getElementById('hero-title');
      if (heroTitle) heroTitle.style.fontSize = `clamp(${base * 1.5}px, 6vw, ${base * 2.8}px)`;
      const heroSub = document.getElementById('hero-subtitle');
      if (heroSub) heroSub.style.fontSize = `${base * 1.05}px`;
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => { applyConfig(config); },
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
            { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family,
            set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => config.font_size || defaultConfig.font_size,
            set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        }),
        mapToEditPanelValues: (config) => new Map([
          ['hero_title', config.hero_title || defaultConfig.hero_title],
          ['hero_subtitle', config.hero_subtitle || defaultConfig.hero_subtitle],
          ['explore_title', config.explore_title || defaultConfig.explore_title],
          ['footer_text', config.footer_text || defaultConfig.footer_text]
        ])
      });
    }

    // Air@canva.xin
    lucide.createIcons();
  </script>
